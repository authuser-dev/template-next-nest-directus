name: Docker Security Scan

on:
    pull_request:
    push:
        branches:
            - main
            - master
    schedule:
        - cron: "0 5 * * 1"

jobs:
    trivy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Run Trivy scan
              uses: aquasecurity/trivy-action@0.28.0
              with:
                  scan-type: fs
                  scan-ref: .
                  ignore-unfixed: true
                  severity: CRITICAL,HIGH
                  exit-code: "1"
